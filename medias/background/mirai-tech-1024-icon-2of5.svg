<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g stroke="#4a4a4a" stroke-opacity="0.25" stroke-width="2">
    <line x1="-200" y1="0" x2="380" y2="1024"/>
    <line x1="-120" y1="0" x2="460" y2="1024"/>
    <line x1="-40" y1="0" x2="540" y2="1024"/>
    <line x1="40" y1="0" x2="620" y2="1024"/>
    <line x1="120" y1="0" x2="700" y2="1024"/>
    <line x1="200" y1="0" x2="780" y2="1024"/>
    <line x1="280" y1="0" x2="860" y2="1024"/>
    <line x1="360" y1="0" x2="940" y2="1024"/>
    <line x1="440" y1="0" x2="1020" y2="1024"/>
  </g>

  <g stroke="#6b6b6b" stroke-opacity="0.16" stroke-width="1">
    <line x1="0" y1="120" x2="1024" y2="120"/>
    <line x1="0" y1="240" x2="1024" y2="240"/>
    <line x1="0" y1="360" x2="1024" y2="360"/>
    <line x1="0" y1="480" x2="1024" y2="480"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="720" x2="1024" y2="720"/>
    <line x1="0" y1="840" x2="1024" y2="840"/>
  </g>

  <ellipse cx="512" cy="392" rx="220" ry="220" fill="#000" fill-opacity="0.35"/>

  <!--
    Icon position controls (easy to adjust later):
    - Canvas width = 1024, height = 1024
    - Target center X = 2/5 * width = 409.6
    - Target center Y = 1/2 * height = 512
    - Icon size = 360
    - x = centerX - size/2 = 229.6
    - y = centerY - size/2 = 332

    To move icon:
    - Increase x => move right
    - Decrease x => move left
    - Increase y => move down
    - Decrease y => move up
    - Change width/height => resize icon
  -->
  <image href="/assets/icons/app-icon.png" x="229.6" y="332" width="360" height="360" preserveAspectRatio="xMidYMid meet"/>
</svg>
